<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pond今天追到老婆了吗？</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffe0b5 0%, #ffb77c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 20px;
            margin: 0;
        }

        .game-wrapper {
            max-width: 700px;
            width: 100%;
            background: #fffef7;
            border-radius: 48px 32px 56px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px #ffd9a5 inset;
            overflow: hidden;
            transition: all 0.2s;
            position: relative;
        }

        .age-gate {
            position: relative;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 30px 24px;
            text-align: center;
            border-radius: inherit;
            z-index: 20;
        }
        .age-card {
            background: #fff3e6;
            border-radius: 48px;
            padding: 28px 24px;
            max-width: 90%;
            margin: 0 auto;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 2px solid #ffbc7a;
        }
        .age-card h2 {
            margin: 0 0 12px 0;
            color: #b45f2b;
            font-size: 1.8rem;
        }
        .age-card p {
            color: #4f2f1a;
            line-height: 1.5;
            margin: 16px 0;
        }
        .age-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .age-btn {
            background: #c1814b;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 #7a4a25;
        }
        .age-btn:hover {
            background: #a56536;
            transform: translateY(-2px);
        }
        .age-btn:active {
            transform: translateY(2px);
        }
        .age-btn.secondary {
            background: #6f4a2e;
        }

        .game-content {
            display: none;
        }

        .story-area {
            padding: 28px 28px 20px;
            background: #fffaf3;
            border-bottom: 2px solid #ffe0c0;
        }
        .story-text {
            font-size: 1.1rem;
            line-height: 1.55;
            color: #3e2a2a;
            font-weight: 500;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .image-area {
            margin-top: 20px;
            text-align: center;
            background: #f9ebdd;
            border-radius: 32px;
            padding: 12px;
            border: 1px dashed #e2bc8c;
        }
        .story-img {
            max-width: 100%;
            border-radius: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            background: #f0e0ce;
        }

        .options-area {
            padding: 20px 28px 32px;
            background: #fff5ea;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-btn {
            background: #f0c8a0;
            border: none;
            padding: 12px 18px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: #4b2f1a;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 #c2966b;
            border: 1px solid #ffe0b5;
        }
        .option-btn:hover {
            background: #ffdbb5;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #c2966b;
        }
        .option-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #c2966b;
        }
        .reset-btn {
            background: #b97f57;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #fff0df;
            cursor: pointer;
            margin: 0 28px 28px auto;
            display: inline-block;
            width: fit-content;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: 0.1s;
        }
        .reset-btn:hover {
            background: #9b623f;
            transform: scale(0.97);
        }
        .footer {
            display: flex;
            justify-content: flex-end;
            background: #fff5ea;
            padding-top: 0;
        }

        @media (max-width: 550px) {
            .story-text {
                font-size: 0.98rem;
            }
            .option-btn {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            .age-card h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <!-- 年龄确认 / 免责声明遮罩层 -->
    <div id="ageGate" class="age-gate">
        <div class="age-card">
            <h2>⚠️ 温馨提醒</h2>
            <p>本游戏纯属虚构，如有雷同纯属巧合。<br>
            故事中所有角色均已成年，剧情仅为娱乐创作。<br>
            <strong>请确保您已年满18周岁，再开始游玩。</strong></p>
            <div class="age-buttons">
                <button class="age-btn" id="confirmAdult">✅ 是，我已成年</button>
                <button class="age-btn secondary" id="rejectAdult">❌ 否，我未成年</button>
            </div>
        </div>
    </div>

    <!-- 实际游戏内容（初始隐藏） -->
    <div id="gameContent" class="game-content">
        <div class="story-area">
            <div class="story-text" id="storyText">
                加载系统中...
            </div>
            <div id="imageContainer" class="image-area" style="display: none;"></div>
        </div>
        <div class="options-area" id="optionsContainer">
            <button class="option-btn">✨ 开始冒险</button>
        </div>
        <div class="footer">
            <button class="reset-btn" id="resetGameBtn">🔄 重开旅程</button>
        </div>
    </div>
</div>

<script>
    // ======================= 音频控制模块 =======================
    // 背景音乐文件列表
    const bgmFiles = ['bgm1.mp3', 'bgm2.mp3'];
    let currentBgmIndex = 0;
    let bgmAudio = null;          // 当前播放的背景音乐元素
    let specialAudio = null;      // 特殊场景音乐元素
    let isBgmPlaying = false;
    let isSpecialPlaying = false;

    // 初始化背景音乐循环
    function initBackgroundMusic() {
        if (bgmAudio) {
            bgmAudio.pause();
            bgmAudio.removeEventListener('ended', onBgmEnded);
        }
        bgmAudio = new Audio(bgmFiles[currentBgmIndex]);
        bgmAudio.loop = false;   // 手动控制循环
        bgmAudio.addEventListener('ended', onBgmEnded);
    }

    function onBgmEnded() {
        // 切换到下一首
        currentBgmIndex = (currentBgmIndex + 1) % bgmFiles.length;
        bgmAudio.src = bgmFiles[currentBgmIndex];
        bgmAudio.play().catch(e => console.log("背景音乐播放失败:", e));
    }

    function startBackgroundMusic() {
        if (specialAudio && !specialAudio.paused) {
            // 如果有特殊音乐正在播放，不启动背景
            return;
        }
        if (bgmAudio && bgmAudio.paused && !isSpecialPlaying) {
            bgmAudio.play().catch(e => console.log("背景音乐播放失败:", e));
            isBgmPlaying = true;
        } else if (!bgmAudio) {
            initBackgroundMusic();
            bgmAudio.play().catch(e => console.log("背景音乐播放失败:", e));
            isBgmPlaying = true;
        }
    }

    function stopBackgroundMusic() {
        if (bgmAudio) {
            bgmAudio.pause();
            isBgmPlaying = false;
        }
    }

    // 播放特殊场景音乐（循环）
    function playSpecialMusic(file) {
        // 停止当前背景音乐
        stopBackgroundMusic();
        // 停止之前的特殊音乐
        if (specialAudio) {
            specialAudio.pause();
            specialAudio.removeEventListener('ended', onSpecialEnded);
        }
        specialAudio = new Audio(file);
        specialAudio.loop = true;   // 场景音乐循环播放
        specialAudio.play().catch(e => console.log("特殊音乐播放失败:", e));
        isSpecialPlaying = true;
    }

    function stopSpecialMusic() {
        if (specialAudio) {
            specialAudio.pause();
            specialAudio.currentTime = 0;
            isSpecialPlaying = false;
        }
    }

    function resumeBackgroundMusic() {
        stopSpecialMusic();
        if (!isBgmPlaying && bgmAudio) {
            bgmAudio.play().catch(e => console.log("恢复背景音乐失败:", e));
            isBgmPlaying = true;
        } else if (!bgmAudio) {
            initBackgroundMusic();
            bgmAudio.play().catch(e => console.log("恢复背景音乐失败:", e));
            isBgmPlaying = true;
        }
    }

    // 场景音乐控制：根据场景ID决定播放哪首音乐
    function updateMusicByScene(sceneId) {
        // 场景4（幽灵船干扰）播放特殊音乐bgm3
        if (sceneId === 'scene4') {
            // 如果当前没有在播放特殊音乐，则切换
            if (!isSpecialPlaying) {
                playSpecialMusic('bgm3.mp3');
            }
        } else {
            // 其他场景恢复背景音乐
            if (isSpecialPlaying) {
                resumeBackgroundMusic();
            } else {
                // 确保背景音乐在播放（如果没有播放则启动）
                if (!bgmAudio || bgmAudio.paused) {
                    startBackgroundMusic();
                }
            }
        }
    }

    // ======================= 游戏数据 =======================
    let currentSceneId = "scene1";

    // 场景库（根据用户最新脚本调整）
    const scenes = {
        // 场景1：初始决定
        scene1: {
            desc: "你作为泡泡碗宇宙中的一名咸鱼系统，业绩已连续三年蝉联最低，主神勒令你今年必须撮合一段完美姻缘，你决定：",
            image: null,
            options: [
                { text: "💪 奋发图强！", nextScene: "scene2" },
                { text: "🌾 继续摆烂…", nextScene: "ending_farm" }
            ]
        },

        // 回家种田结局
        ending_farm: {
            desc: "🌾 你因业绩年年垫底，被主神开除，失去了工作，只好回家种田。\n\n田里的水稻长势一般，你望着夕阳，心中满是后悔……\n\n【游戏结局 · 咸鱼归田】",
            image: null,
            options: []
        },

        // 场景2：发现宿主，展示pond资料卡图片（本地图片：pond资料卡）
        scene2: {
            desc: "你决定奋发图强，一定要做出点业绩来给主神看看！你辗转了不少小世界，都没有找到一个心仪的宿主。你漫无目的闲逛，终于……\n\n你在一个世界中，看到一个十九岁的少年，他正在参加一个选秀节目，穿着白色外套和橘色笑脸的内搭，虽然看着有些憨傻，但是跳舞的时候格外有魅力，毫不意外的，他获得了这次选秀的冠军，你决定选择他作为你的宿主。\n\n✨ 宿主资料卡 ✨\n姓名：Naravit Lertratkosum\n昵称：Pond\n身高：185cm\n体重：75kg\n生日：2001.02.01\n血型：A\n喜欢的颜色：灰\n喜欢的数字：4\n大学：泰国先皇理工大学",
            image: {
                type: "pond_card",
                filename: "pond1.jpg"
            },
            options: [
                { text: "📋 继续", nextScene: "scene3" }
            ]
        },

        // 场景3：选择攻略对象
        scene3: {
            desc: "现在，你手上有四个人选可以作为宿主 Pond 的攻略对象，请选择你认为最有可能跟宿主成就一段美满姻缘的人：",
            image: null,
            options: [
                { text: "💘 Phuwin", nextScene: "scene5" },
                { text: "💘 Dunk", nextScene: "scene4" },
                { text: "💘 Fourth", nextScene: "scene4" },
                { text: "💘 Santa", nextScene: "scene4" }
            ]
        },

        // 场景4：幽灵船干扰，撞晕重选（此场景将播放特殊音乐bgm3）
        scene4: {
            desc: "在你即将要做出选择的时候，突然有一个和宿主很像，但看着年长一些的男人冲了出来，嘴里还大喊着“I don't like ghostship！PondPhuwin Only。”就把你撞晕了。\n\n你迷迷糊糊醒来，发现自己不得不重新选择攻略对象。",
            image: null,
            options: [
                { text: "🔁 重新选择攻略对象", nextScene: "scene3" }
            ]
        },

        // 场景5：展示phuwin资料卡 + 图片，无奖励选择（仅“继续”按钮）
        scene5: {
            desc: "你很有眼光。\n\n✨Phuwin资料卡 ✨\n姓名：Phuwin Tangsakyuen\n昵称：Phuwin\n身高：180cm\n体重：67kg\n生日：2003.07.05\n血型：AB\n喜欢的颜色：深黑、深灰、白\n喜欢的数字：6、8\n大学：朱拉隆功大学",
            image: {
                type: "phuwin_card",
                filename: "phuwin1.jpg"
            },
            options: [
                { text: "➡️ 继续", nextScene: "scene6" }
            ]
        },

        // 场景6：奖励选择
        scene6: {
            desc: "现在，你飘到了宿主的脑中，他被脑海中突如其来的陌生声音吓了一跳，你向他说明了你的来意，并许诺他攻略任务完成后，他会获得一定的奖励，你准备选择什么样的奖励，来引诱宿主与你完成绑定：",
            image: null,
            options: [
                { text: "💰 500w 泰铢", nextScene: "scene7" },
                { text: "🕷️ 变成蜘蛛侠", nextScene: "scene8" },
                { text: "🎤 和喜欢的偶像共度晚餐", nextScene: "scene9" },
                { text: "💑 拥有一个完美的老婆", nextScene: "scene10" }
            ]
        },

        // 场景7：500w拒绝，回场景6
        scene7: {
            desc: "宿主脸上露出了震惊的表情，他虽然很想要这500w，但挣扎了一番，最终还是朝你摇了摇头，并对你说道：“钱我自己也能挣”。\n\n看来这个奖励不够诱人，再试试别的吧。",
            image: null,
            options: [
                { text: "🔙 重新选择奖励", nextScene: "scene6" }
            ]
        },

        // 场景8：蜘蛛侠拒绝，回场景6
        scene8: {
            desc: "宿主觉得你是个疯子，但发现摆脱不掉你的声音后，他觉得是自己疯了，担惊受怕地去看了心理医生。\n\n你的系统差点被举报，赶紧换个正常点的奖励吧。",
            image: null,
            options: [
                { text: "🔙 重新选择奖励", nextScene: "scene6" }
            ]
        },

        // 场景9：偶像晚餐拒绝，回场景6
        scene9: {
            desc: "“这根本不算什么奖励嘛。”宿主抱怨着。\n\n他虽然追星但这个奖励也太儿戏了，看来你需要拿出更有吸引力的方案。",
            image: null,
            options: [
                { text: "🔙 重新选择奖励", nextScene: "scene6" }
            ]
        },

        // 场景10：展示phuwin照片，宿主答应绑定 -> 跳转场景11（待续）
        scene10: {
            desc: "你找了一张 Phuwin 成年后的照片给宿主看，告诉他这就是和你绑定以后系统给他分配的老婆，宿主没有说话，不知道在想些什么，随后忽然咧开嘴笑了，笑得很不好意思地捂住了嘴，在你有些怀疑自己是否要换个宿主的时候，他答应了你的绑定。",
            image: {
                type: "phuwin_photo",
                filename: "phuwin.jpg"
            },
            options: [
                { text: "🎉 绑定成功，继续旅程", nextScene: "scene11" }
            ]
        },

        // 场景11：待续（后续剧情由您补充）
        scene11: {
            desc: "✨ 绑定成功！✨\n\n宿主 Pond 在你的协助下，即将展开与 Phuwin 的甜蜜故事……\n\n📖 更多精彩剧情，敬请期待后续更新！\n\n（游戏未完待续，您可随时重置重玩）",
            image: null,
            options: []
        }
    };

    // ------------------- 图片渲染（仅图片，无额外说明）-------------------
    function renderImage(scene) {
        const imgContainer = document.getElementById("imageContainer");
        if (!scene.image) {
            imgContainer.style.display = "none";
            imgContainer.innerHTML = "";
            return;
        }

        imgContainer.style.display = "block";
        const filename = scene.image.filename;
        // 纯图片标签，无额外文字说明
        imgContainer.innerHTML = `<img class="story-img" src="${filename}" alt="角色图片" style="max-width:100%;" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 400 300\'%3E%3Crect width=\'400\' height=\'300\' fill=\'%23eeddcc\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23945e38\' font-size=\'14\'%3E图片未找到：${filename}%3C/text%3E%3C/svg%3E';">`;
    }

    // 渲染当前场景
    function renderScene() {
        const scene = scenes[currentSceneId];
        if (!scene) {
            currentSceneId = "scene1";
            renderScene();
            return;
        }

        document.getElementById("storyText").innerText = scene.desc;
        renderImage(scene);

        // 根据场景ID更新音乐
        updateMusicByScene(currentSceneId);

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";

        if (!scene.options || scene.options.length === 0) {
            const infoMsg = document.createElement("div");
            infoMsg.style.textAlign = "center";
            infoMsg.style.padding = "12px";
            infoMsg.style.color = "#b87a4b";
            infoMsg.style.fontStyle = "italic";
            infoMsg.innerText = "🏁 故事已抵达终点 🏁\n点击下方「重开旅程」开启新篇章";
            optionsContainer.appendChild(infoMsg);
            return;
        }

        scene.options.forEach(option => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = option.text;
            btn.addEventListener("click", () => {
                if (option.nextScene) {
                    currentSceneId = option.nextScene;
                    renderScene();
                }
            });
            optionsContainer.appendChild(btn);
        });
    }

    function resetGame() {
        currentSceneId = "scene1";
        renderScene();
        // 重置音乐：确保背景音乐恢复，特殊音乐停止
        if (isSpecialPlaying) {
            resumeBackgroundMusic();
        } else if (!bgmAudio || bgmAudio.paused) {
            startBackgroundMusic();
        }
    }

    // 年龄确认逻辑
    const ageGateDiv = document.getElementById("ageGate");
    const gameContentDiv = document.getElementById("gameContent");
    const confirmBtn = document.getElementById("confirmAdult");
    const rejectBtn = document.getElementById("rejectAdult");

    confirmBtn.addEventListener("click", () => {
        ageGateDiv.style.display = "none";
        gameContentDiv.style.display = "block";
        // 用户交互后初始化并播放背景音乐
        initBackgroundMusic();
        startBackgroundMusic();
        resetGame();
    });

    rejectBtn.addEventListener("click", () => {
        const ageCard = ageGateDiv.querySelector(".age-card");
        ageCard.innerHTML = `
            <h2>🚫 无法进入游戏</h2>
            <p>根据相关规定，未满18周岁不能游玩本游戏。<br>
            祝您健康成长，待成年后再来体验。</p>
            <button class="age-btn" id="backToAgeCheck">◀ 返回重试</button>
        `;
        const backBtn = document.getElementById("backToAgeCheck");
        backBtn.addEventListener("click", () => {
            location.reload();
        });
    });

    document.addEventListener("click", (e) => {
        if (e.target.id === "resetGameBtn") {
            resetGame();
        }
    });

    ageGateDiv.style.display = "block";
    gameContentDiv.style.display = "none";
</script>
</body>
</html>
